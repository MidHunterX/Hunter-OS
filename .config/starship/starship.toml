# ============================ [ PROMPT DESIGN ] ============================ #

[fill]
symbol = ' '
style = 'bold black'

[os]
disabled = true
style = "bg:col_usr fg:col_blk"

[username]
show_always = false
style_user = "bg:col_usr fg:col_blk"
style_root = "bg:col_usr fg:col_blk"
format = '[ $user ]($style)'

[directory]
read_only = "َ°Œ¾ "
style = "bg:col_dir fg:col_wht"
format = "[ ًں–؟ $path ]($style)[$read_only](fg:col_ylo bg:col_dir)"
truncation_length = 2
# truncation_symbol = "â€¦/"

[jobs]
symbol = 'î­؟ '
format = '[ $symbol$number ]($style)'

[status]
symbol = '[îƒ—](fg:col_red)[ ï€چ ](bg:col_red fg:col_wht)[î‚´](fg:col_red)'
success_symbol = '[îƒ—](fg:col_chk)[ ï€Œ ](bg:col_chk fg:col_blk)[î‚´](fg:col_chk)'
not_executable_symbol = '[îƒ—](fg:col_red)[ ïپ‍ ](bg:col_red fg:col_wht)[î‚´](fg:col_red)'
not_found_symbol =	'[îƒ—](fg:col_ylo)[ ï€‚ ](bg:col_ylo fg:col_blk)[î‚´](fg:col_ylo)'
sigint_symbol =	'[îƒ—](fg:col_red)[ î€‰ ](bg:col_red fg:col_wht)[î‚´](fg:col_red)' # Interrupt Signal (ctrl+c)
signal_symbol = '[îƒ—](fg:col_ylo)[ î€ٹ ](bg:col_ylo fg:col_blk)[î‚´](fg:col_ylo)'
style = "bg:col_chk fg:col_blk"
format = '[$symbol]($style)'
map_symbol = true
disabled = false

[cmd_duration]
min_time = 1000
show_milliseconds = false
disabled = false
style = "bold italic col_ylo"
format = " took [$duration]($style)"

[character]
# Added extra space after symbol because of NerdFont's extra width
success_symbol = "[î‚¶](col_usr)[ َ°£‡  ](fg:col_blk bg:col_usr)[î‚°](fg:col_usr)"
error_symbol = "[î‚¶](col_vim_err)[ ïŒƒ  ](fg:col_wht bg:col_vim_err)[î‚°](fg:col_vim_err)"
# success_symbol = "[ INSERT ](fg:bold col_blk bg:col_vim_ins) "
# error_symbol = "[ ERROR ](fg:bold col_wht bg:col_vim_err) "
vimcmd_symbol ="[î‚¶](col_vim_nor)[ ïچ¯  ](fg:bold black bg:col_vim_nor)[î‚°](fg:col_vim_nor)"
vimcmd_replace_one_symbol = "[î‚¶](col_vim_rep)[ ï†¸  ](fg:bold black bg:col_vim_rep)[î‚°](fg:col_vim_rep)"
vimcmd_replace_symbol = "[î‚¶](col_vim_rep)[ ï†¸  ](fg:bold black bg:col_vim_rep)[î‚°](fg:col_vim_rep)"
vimcmd_visual_symbol = "[î‚¶](col_vim_vis)[ îڑ¬  ](fg:bold black bg:col_vim_vis)[î‚°](fg:col_vim_vis)"
format = '$symbol'
disabled = false

