deleted       = 'ï…† ${count} '
renamed       = 'ï…چ ${count} '
modified      = 'ï…‹ ${count} '
untracked     = 'ï„¨ ${count} '
stashed       = 'ï…• '
diverged      = 'ïپ½ '
up_to_date    = ''
ahead         = 'ïپ¢ ${count} '
behind        = 'ïپ£ ${count} '
style         = "fg:col_blk bg:col_git"
format        = '[ $all_status$ahead_behind]($style)'

