# в–Ҳв–‘в–Ҳ в–Ҳв–Җв–Җ в–Ҳв–‘в–‘в–Ҳ гҖҖ в–Ҳв–Җв–Җв–„ в–‘в–Җв–‘ в–Ҳв–Җв–Җв–„ в–Ҳв–Җв–Җв–„ в–‘в–Җв–‘ в–Ҳв–Җв–Җв–„ в–Ҳв–Җв–Җв–Җ в–Ҳв–Җв–Җ
# в–Ҳв–Җв–„ в–Ҳв–Җв–Җ в–Ҳв–„в–„в–Ҳ гҖҖ в–Ҳв–Җв–Җв–„ в–Җв–Ҳв–Җ в–Ҳв–‘в–‘в–Ҳ в–Ҳв–‘в–‘в–Ҳ в–Җв–Ҳв–Җ в–Ҳв–‘в–‘в–Ҳ в–Ҳв–‘в–Җв–Ҳ в–Җв–Җв–Ҳ
# в–Җв–‘в–Җ в–Җв–Җв–Җ в–„в–„в–„в–Ҳ гҖҖ в–Җв–Җв–Җв–‘ в–Җв–Җв–Җ в–Җв–‘в–‘в–Җ в–Җв–Җв–Җв–‘ в–Җв–Җв–Җ в–Җв–‘в–‘в–Җ в–Җв–Җв–Җв–Җ в–Җв–Җв–Җ

# Keys (use the name after XKB_KEY_):
# https://github.com/xkbcommon/libxkbcommon/blob/master/include/xkbcommon/xkbcommon-keysyms.h

# VARIABLES
# ---------
$terminal = kitty
$browser = python ~/Mid_Hunter/scripts/assistants/hyprchan/run_firefox.py
$menu = vicinae open # wofi > fuzzel > vicinae
$whisper = perl ~/.config/hypr/scripts/whisper.pl
exec-once = vicinae server
$MODE_SET = hyprctl dispatch submap
$MODE_RESET = hyprctl dispatch submap reset

$NOTIFY_SEND = notify-send -r 69
$NOTIFY_CLOSE = dunstctl close 69


# в–Ҳв–Җв–„в–Җв–ҲвҖғв–ҲвҖғв–Ҳв–ҖвҖғв–Ҳв–Җв–Җ
# в–Ҳв–‘в–Җв–‘в–ҲвҖғв–ҲвҖғв–„в–ҲвҖғв–Ҳв–„в–„
bind = SUPER, Q, exec, $terminal
# Simple Screenshot Functions
bind = , Print, execr, grim | wl-copy
bind = SUPER SHIFT, P, execr, grim -g "$(slurp)" - | wl-copy
bind = SUPER,P,execr,grim ~/Pictures/$(date +%Y%m%d-%H%M%S-%2N).jpg | wl-copy
# Logout Screen
bind = SUPER, B, execr, wlogout --protocol layer-shell
# Exit Hyprland
bind = SUPER SHIFT, B, execr, bash ~/Mid_Hunter/scripts/kill_hypr.sh
# bind = SUPER SHIFT, B, exit,

# в–Ҳв–‘в–Ҳ в–Ҳв–Җв–Ҳ в–Ҳ в–Ҳв–Җв–Җ в–Ҳв–Җв–Җ   в–Җв–Ҳв–Җ в–Ҳв–„в–Ҳ в–Ҳв–Җв–Ҳ в–Ҳ в–Ҳв–„в–‘в–Ҳ в–Ҳв–Җв–Җ   в–Ҳв–Җв–„в–Җв–Ҳ в–Ҳв–Җв–Ҳ в–Ҳв–Җв–„ в–Ҳв–Җв–Җ
# в–Җв–„в–Җ в–Ҳв–„в–Ҳ в–Ҳ в–Ҳв–„в–„ в–Ҳв–Ҳв–„   в–‘в–Ҳв–‘ в–‘в–Ҳв–‘ в–Ҳв–Җв–Җ в–Ҳ в–Ҳв–‘в–Җв–Ҳ в–Ҳв–„в–Ҳ   в–Ҳв–‘в–Җв–‘в–Ҳ в–Ҳв–„в–Ҳ в–Ҳв–„в–Җ в–Ҳв–Ҳв–„
# Voice Typing mode [SCROLL_LOCK] to toggle
bind = , SCROLL_LOCK, exec, $MODE_SET Voice_Typing && $whisper start
submap = Voice_Typing
    bind = , SCROLL_LOCK, exec, $whisper stop
    bind = , SCROLL_LOCK, submap, reset
submap = reset

# SUBMAP: Whisper
bind = SUPER, W, exec, $MODE_SET Whisper && $whisper start
submap = Whisper
    # exit submap
    bind = , W, exec, $whisper stop && $MODE_RESET
    bind = , escape, exec, $whisper stop && $MODE_RESET
submap = reset

# в–Җв–Ҳв–Җ в–Ҳв–Җв–Ҳ в–„в–Җв–Ҳ в–Ҳв–„в–‘в–Ҳ в–Ҳв–Җ в–Ҳв–Җв–Җ в–Ҳв–Җв–Ҳ в–Ҳв–Җв–Ҳ в–Ҳв–Җв–„в–Җв–Ҳ   в–Ҳв–Җв–„в–Җв–Ҳ в–Ҳв–Җв–Ҳ в–Ҳв–Җв–„ в–Ҳв–Җв–Җ
# в–‘в–Ҳв–‘ в–Ҳв–Җв–„ в–Ҳв–Җв–Ҳ в–Ҳв–‘в–Җв–Ҳ в–„в–Ҳ в–Ҳв–Җв–‘ в–Ҳв–„в–Ҳ в–Ҳв–Җв–„ в–Ҳв–‘в–Җв–‘в–Ҳ   в–Ҳв–‘в–Җв–‘в–Ҳ в–Ҳв–„в–Ҳ в–Ҳв–„в–Җ в–Ҳв–Ҳв–„
# Transformation mode [MOD+T] like Photoshop
bind = SUPER, T, submap, Transform
submap = Transform
    binde = , h, movefocus, l
    binde = , j, movefocus, d
    binde = , k, movefocus, u
    binde = , l, movefocus, r
    bind = SHIFT, h, movewindow, l
    bind = SHIFT, j, movewindow, d
    bind = SHIFT, k, movewindow, u
    bind = SHIFT, l, movewindow, r
    binde = CTRL, h, resizeactive, -10 0
    binde = CTRL, j, resizeactive, 0 10
    binde = CTRL, k, resizeactive, 0 -10
    binde = CTRL, l, resizeactive, 10 0
    binde = CTRL SHIFT, H, resizeactive, -50 0
    binde = CTRL SHIFT, J, resizeactive, 0 50
    binde = CTRL SHIFT, K, resizeactive, 0 -50
    binde = CTRL SHIFT, L, resizeactive, 50 0
    # Exit
    bind = , escape, submap, reset
    bind = SHIFT, slash, exec, $NOTIFY_SEND "Transform Mode" "--" " hjkl - Select Window\n SHIFT + hjkl - Move Window\n CTRL + hjkl - Resize Window\n escape - exit"
submap = reset


# в–Ҳв–Җв–Җ в–Ҳв–‘в–Ҳ в–Ҳв–Җв–Ҳ в–Ҳв–Җ в–Ҳв–Җв–Ҳ в–Ҳв–Җв–Ҳ   в–Ҳв–Җв–„в–Җв–Ҳ в–Ҳв–Җв–Ҳ в–Ҳв–Җв–„ в–Ҳв–Җв–Җ
# в–Ҳв–„в–„ в–Ҳв–„в–Ҳ в–Ҳв–Җв–„ в–„в–Ҳ в–Ҳв–„в–Ҳ в–Ҳв–Җв–„   в–Ҳв–‘в–Җв–‘в–Ҳ в–Ҳв–„в–Ҳ в–Ҳв–„в–Җ в–Ҳв–Ҳв–„
$cursor_show = hyprctl keyword cursor:inactive_timeout 0; hyprctl keyword cursor:hide_on_key_press false
$cursor_hide = hyprctl keyword cursor:inactive_timeout 3; hyprctl keyword cursor:hide_on_key_press true
$cursor_yeet = hyprctl dispatch movecursor 1920 540

bind = SUPER, C, exec, hyprctl dispatch submap Cursor && $cursor_show
submap = Cursor
    # Source: https://github.com/moverest/wl-kbptr
    # Find position and Jump Cursor to it (requires wl-kbptr)
    bind = , f, exec, hyprctl dispatch submap reset && wl-kbptr -o modes=tile && wlrctl pointer move 0 1 && hyprctl dispatch submap Cursor;

    # SUBMAP: ColorPicker
    bind = , C, exec, hyprctl dispatch submap ColorPicker && hyprpicker | wl-copy
    submap = ColorPicker
        binde = , j, exec, wlrctl pointer move 0 1
        binde = , k, exec, wlrctl pointer move 0 -1
        binde = , l, exec, wlrctl pointer move 1 0
        binde = , h, exec, wlrctl pointer move -1 0
        binde = SHIFT, J, exec, wlrctl pointer move 0 5
        binde = SHIFT, K, exec, wlrctl pointer move 0 -5
        binde = SHIFT, L, exec, wlrctl pointer move 5 0
        binde = SHIFT, H, exec, wlrctl pointer move -5 0
        # Pick Color -> Keep mouse away -> Return full control to user
        bind = , i, exec, wlrctl pointer click left && $cursor_yeet && $cursor_hide && $MODE_RESET
        # exit ColorPicker mode
        bind = , escape, exec, hyprctl dispatch submap Cursor && pkill hyprpicker
    submap = Cursor

    # Cursor movement (requires wlrctl)
    binde = , j, exec, wlrctl pointer move 0 10
    binde = , k, exec, wlrctl pointer move 0 -10
    binde = , l, exec, wlrctl pointer move 10 0
    binde = , h, exec, wlrctl pointer move -10 0
    binde = SHIFT, J, exec, wlrctl pointer move 0 50
    binde = SHIFT, K, exec, wlrctl pointer move 0 -50
    binde = SHIFT, L, exec, wlrctl pointer move 50 0
    binde = SHIFT, H, exec, wlrctl pointer move -50 0
    # Click Emulation
    bind = , i, exec, wlrctl pointer click left
    bind = , o, exec, wlrctl pointer click right
    bind = , m, exec, wlrctl pointer click middle
    # Scroll Emulation (up/down)
    binde = , u, exec, wlrctl pointer scroll 10 0
    binde = , d, exec, wlrctl pointer scroll -10 0
    # Scroll Emulation (left/right)
    binde = , b, exec, wlrctl pointer scroll 0 -10
    binde = , w, exec, wlrctl pointer scroll 0 10

    # Exit submap
    bind = , escape, exec, $MODE_RESET && $cursor_hide
submap = reset


# в–Ҳв–Җв–Җ в–Җв–„в–Җ в–Ҳв–Җв–Җ в–Ҳв–Җв–Җ в–Ҳв–‘в–Ҳ в–Җв–Ҳв–Җ в–Ҳв–Җв–Җ   в–Ҳв–Җв–„в–Җв–Ҳ в–Ҳв–Җв–Ҳ в–Ҳв–Җв–„ в–Ҳв–Җв–Җ
# в–Ҳв–Ҳв–„ в–Ҳв–‘в–Ҳ в–Ҳв–Ҳв–„ в–Ҳв–„в–„ в–Ҳв–„в–Ҳ в–‘в–Ҳв–‘ в–Ҳв–Ҳв–„   в–Ҳв–‘в–Җв–‘в–Ҳ в–Ҳв–„в–Ҳ в–Ҳв–„в–Җ в–Ҳв–Ҳв–„
bind = SUPER, E, submap, Execute
submap = Execute
    # SUBMAP: Brightness
    $BrightnessMenu = "Brightness Mode (e > b)" "--" " u - brightness +2\n d - brightness -1\n x - learn\n l - lock toggle\n q - exit\n esc - exit"
    bind = , B, exec, $MODE_SET Brightness && $NOTIFY_SEND $BrightnessMenu
    submap = Brightness
        binde = , u, exec, swayosd-client --brightness +2
        binde = , d, exec, swayosd-client --brightness -1
        # exit submap
        bind = , l, exec, perl ~/automata/radiance/worker.pl --toggle
        bind = , l, exec, $MODE_RESET && $NOTIFY_CLOSE
        bind = , x, exec, perl ~/automata/radiance/learn.pl
        bind = , x, exec, $MODE_RESET && $NOTIFY_CLOSE
        bind = , q, exec, $MODE_RESET && $NOTIFY_CLOSE
        bind = , escape, exec, $MODE_RESET && $NOTIFY_CLOSE
        bind = SHIFT, slash, exec, $NOTIFY_SEND $BrightnessMenu
    submap = Execute

    # Firefox Experiment Profile [MOD+E E]
    bind = , E, exec, $MODE_RESET && $browser Experiment
    # Firefox Personal Profile [MOD+E F]
    bind = , F, exec, $MODE_RESET && $browser Personal
    # Kitty Terminal [MOD+F K]
    bind = , K, exec, $MODE_RESET && $terminal ~/Mid_Hunter/scripts/fetch.pl
    # nvim textinput
    bind = , N, exec, $MODE_RESET && perl ~/Mid_Hunter/scripts/nvim_textinput.pl
    # OCR using Tesseract
    bind = , P, exec, $MODE_RESET && grim -g "$(slurp)" - | tesseract - - | wl-copy

    # SUBMAP: Volume
    bind = , V, submap, Volume
    submap = Volume
        binde = , u, exec, swayosd-client --output-volume raise
        binde = , d, exec, swayosd-client --output-volume lower
        bind = , m, exec, swayosd-client --output-volume mute-toggle
        # exit submap
        bind = , x, submap, reset
        bind = , q, submap, reset
        bind = , escape, submap, reset
        bind = SHIFT, slash, exec, $NOTIFY_SEND "Volume Mode (e > v)" "--" " u - volume +1\n d - volume -1\n m - mute\n x - exit\n q - exit\n escape - exit"
    submap = Execute

    # Toggle Waybar
    bind = SHIFT, W, exec, $MODE_RESET && killall -SIGUSR1 waybar
    bind = , W, exec, $MODE_RESET && pkill -x waybar 2>/dev/null; waybar

    # exit submap
    bind = , escape, submap, reset
    # bind = , escape, exec, $MODE_RESET && dunstctl close 69
    bind = SHIFT, slash, exec, $NOTIFY_SEND "Execute Mode (e)" "--" " b - [Brightness Mode]\n e - Entertainment\n f - Firefox Browser\n k - Kitty Terminal\n n - Nvim Input\n p - Printscreen\n P - Printscreen OCR \n v - [Volume Mode]\n w - Refresh Waybar\n escape - Exit"
submap = reset


# в–Ҳв–‘в–Ҳв–‘в–ҲвҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–Ҳв–‘в–ҲвҖғв–Ҳв–ҖвҖғ вҖғв–Ҳв–ҖвҖғв–Җв–Ҳв–ҖвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–‘в–‘вҖғв–Ҳв–Җв–ҖвҖғ вҖғв–Ҳв–„в–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Җ
# в–Җв–„в–Җв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–Җв–„в–ҖвҖғв–„в–ҲвҖғ вҖғв–„в–ҲвҖғв–‘в–Ҳв–‘вҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғ вҖғв–Ҳв–„в–ҲвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–„в–Ҳ
# [Alt+Tab] through existing workspaces
bind = ALT, TAB, workspace, e+1
# [Super+.] Emoji Selector
bind = SUPER, PERIOD, execr, bash ~/Mid_Hunter/scripts/menu_emoji.sh
# [Alt+Space] Launcher
bind = ALT, SPACE, exec, $menu
# Process Manager
bind = CONTROL, ESCAPE, execr, $terminal htop
bind = CONTROL ALT, DELETE, execr, $terminal htop


# в–Ҳв–‘в–Ҳв–‘в–ҲвҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–Ҳв–‘в–ҲвҖғ вҖғв–Ҳв–Җв–„в–Җв–ҲвҖғв–„в–Җв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–„в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–„в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–‘в–ҲвҖғв–Җв–Ҳв–Җ
# в–Җв–„в–Җв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–Җв–„в–ҖвҖғ вҖғв–Ҳв–‘в–Җв–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–‘в–Җв–‘в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–‘в–Җв–ҲвҖғв–‘в–Ҳв–‘
bind = SUPER, X, killactive,
bind = SUPER, F, fullscreen
#bind = SUPER, M, togglesplit,
bind = SUPER, V, togglefloating,
# Example special workspace (scratchpad)
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic
# Tab through existing workspaces
bind = SUPER, TAB, workspace, e+1
bind = SUPER SHIFT, TAB, workspace, e-1


# в–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–Җ
# в–Ҳв–Җв–‘вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–„в–ҲвҖғв–„в–Ҳ
# Move focus with mainMod + hjkl
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d
# Cycle through windows with mainMod + n
bind = SUPER, n, cyclenext


# в–Ҳв–ҖвҖғв–Ҳв–‘в–Ҳв–‘в–ҲвҖғв–ҲвҖғв–Җв–Ҳв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–‘в–Ҳ
# в–„в–ҲвҖғв–Җв–„в–Җв–„в–ҖвҖғв–ҲвҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–„вҖғв–Ҳв–Җв–Ҳ
# Switch workspaces
bind = SUPER, U, workspace, 1
bind = SUPER, I, workspace, 2
bind = SUPER, O, workspace, 3
# bind = SUPER, U, exec, bash ~/.config/hypr/scripts/switch_now.sh 1
# bind = SUPER, I, exec, bash ~/.config/hypr/scripts/switch_now.sh 2
# bind = SUPER, O, exec, bash ~/.config/hypr/scripts/switch_now.sh 3

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10


# в–Ҳв–Җв–„в–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–Җв–Җ
# в–Ҳв–‘в–Җв–‘в–ҲвҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–ҖвҖғв–Ҳв–Ҳв–„
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
# Move active window to a workspace
bind = SUPER SHIFT, U, movetoworkspace, 1
bind = SUPER SHIFT, I, movetoworkspace, 2
bind = SUPER SHIFT, O, movetoworkspace, 3
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Move windows with mainMod + SHIFT + [H/J/K/L]
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r


# в–Ҳв–Җв–ҖвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Җв–Ҳв–ҖвҖғв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–Ҳв–‘в–Ҳ
# в–Ҳв–Җв–‘вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–„вҖғв–‘в–Ҳв–‘вҖғв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғ вҖғв–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–Җв–„в–Җ
# Volume Keys
bindl =, XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindl =, XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindl =, XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
# Brightness Keys
bindl =, XF86MonBrightnessUp, exec, brillo -q -A 1
bindl =, XF86MonBrightnessDown, exec, brillo -q -U 1
